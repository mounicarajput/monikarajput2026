<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Monika Rajput</title>
    <meta name="description" content="Get in touch with Monika Rajput." />
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --card: #ffffff;
        --text: #050816;
        --muted: #4b5563;
        --border: #e5e7eb;
        --link: #0b57d0;
        --primary: #0b57d0;
        --primary-hover: #0842a0;
        --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.10);
        --shadow-card: 0 10px 24px rgba(15, 23, 42, 0.08);
        --radius-lg: 28px;
        --radius-md: 20px;
        --radius-sm: 12px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: block;
        padding: 56px 18px 72px;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto,
          Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: var(--bg);
        color: var(--text);
      }

      .nav {
        width: min(1040px, 100%);
        margin: 0 auto 40px;
        padding: 0 4px;
      }

      .nav-link {
        color: var(--link);
        text-decoration: none;
        font-size: 0.95rem;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.2s;
      }

      .nav-link:hover {
        opacity: 0.8;
      }

      main {
        width: min(1040px, 100%);
        margin: 0 auto;
        padding: 0;
        text-align: center;
      }

      .hero {
        padding: 6px 4px 24px;
      }

      h1 {
        font-size: clamp(2.0rem, 3.6vw, 3.0rem);
        line-height: 1.15;
        margin: 0 0 12px;
        font-weight: 850;
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
        font-size: 1.05rem;
      }

      h2 {
        margin: 28px 4px 16px;
        font-size: 1.4rem;
        letter-spacing: -0.01em;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 22px;
        padding: 0 4px;
      }

      @media (max-width: 900px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 560px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }

      .card {
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 12px;
        padding: 18px;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        background: var(--card);
        box-shadow: var(--shadow-card);
        text-decoration: none;
        color: inherit;
        min-height: 150px;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      }

      .card:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 32px rgba(15, 23, 42, 0.12);
        border-color: rgba(11, 87, 208, 0.22);
      }

      .card:focus-visible {
        outline: 3px solid rgba(11, 87, 208, 0.25);
        outline-offset: 3px;
      }

      .card-head {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .icon {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        border: 1px solid rgba(0, 0, 0, 0.06);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        flex: 0 0 auto;
      }

      .icon svg {
        width: 24px;
        height: 24px;
      }

      .card-title {
        margin: 0;
        font-weight: 800;
        font-size: 1.08rem;
        letter-spacing: -0.01em;
      }

      .card-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.95rem;
        overflow-wrap: anywhere;
      }

      .span-2 {
        grid-column: span 2;
      }

      @media (max-width: 900px) {
        .span-2 {
          grid-column: span 2;
        }
      }

      @media (max-width: 560px) {
        .span-2 {
          grid-column: span 1;
        }
      }

      .tint-blue {
        background: #eef6ff;
      }
      .tint-gray {
        background: #f3f4f6;
      }
      .tint-cream {
        background: #fff9e9;
      }
      .tint-pink {
        background: #fff0f6;
      }

      .contact-form {
        background: var(--card);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        box-shadow: var(--shadow-card);
        padding: 32px;
        max-width: 600px;
        margin: 40px auto 0;
        text-align: left;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        font-size: 0.95rem;
        color: var(--text);
      }

      input[type="text"],
      input[type="email"],
      textarea {
        width: 100%;
        padding: 12px 16px;
        font-size: 1rem;
        border: 2px solid var(--border);
        border-radius: var(--radius-sm);
        background: var(--bg);
        color: var(--text);
        font-family: inherit;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      textarea {
        resize: vertical;
        min-height: 120px;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(11, 87, 208, 0.1);
      }

      .submit-btn {
        width: 100%;
        padding: 14px 24px;
        font-size: 1rem;
        font-weight: 600;
        color: white;
        background: var(--primary);
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-family: inherit;
        transition: background 0.2s, transform 0.1s;
        box-shadow: 0 4px 12px rgba(11, 87, 208, 0.2);
      }

      .submit-btn:hover:not(:disabled) {
        background: var(--primary-hover);
        transform: translateY(-1px);
        box-shadow: 0 6px 16px rgba(11, 87, 208, 0.3);
      }

      .submit-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <nav class="nav">
      <a href="index.html" class="nav-link">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to Home
      </a>
    </nav>

    <main>
      <section class="hero">
        <h1>Get In Touch</h1>
        <p class="subtitle">
          Let's connect and collaborate.
        </p>
      </section>

      <h2>Contact Methods</h2>

      <section class="grid" aria-label="Contact links">
        <a class="card tint-blue" href="mailto:rajputmonika953@gmail.com">
          <div class="card-head">
            <div class="icon" aria-hidden="true" style="background:#dbeafe;">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M4.5 6.5h15A2.5 2.5 0 0 1 22 9v6a2.5 2.5 0 0 1-2.5 2.5h-15A2.5 2.5 0 0 1 2 15V9a2.5 2.5 0 0 1 2.5-2.5Z"
                  fill="#0f172a"
                  opacity="0.9"
                />
                <path d="M4.5 9 12 13.5 19.5 9" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </div>
            <div>
              <div class="card-title">Email</div>
              <div class="card-subtitle">rajputmonika953@gmail.com</div>
            </div>
          </div>
          <div class="card-subtitle">Send me an email anytime.</div>
        </a>

        <a class="card tint-gray" href="https://www.linkedin.com/in/mounicarajput/" target="_blank" rel="noreferrer noopener">
          <div class="card-head">
            <div class="icon" aria-hidden="true" style="background:#e5e7eb;">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M6.5 6.8A2.3 2.3 0 1 1 6.5 2.2a2.3 2.3 0 0 1 0 4.6ZM4.5 21V9h4v12h-4Zm6.5-12h3.8v1.6h.1c.5-.9 1.8-1.9 3.7-1.9 4 0 4.7 2.6 4.7 6V21h-4v-5.3c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9V21h-4V9Z"
                  fill="#0f172a"
                />
              </svg>
            </div>
            <div>
              <div class="card-title">LinkedIn</div>
              <div class="card-subtitle">/in/mounicarajput</div>
            </div>
          </div>
          <div class="card-subtitle">Let's connect professionally.</div>
        </a>

        <a class="card tint-pink" href="https://x.com/mounicarajput" target="_blank" rel="noreferrer noopener">
          <div class="card-head">
            <div class="icon" aria-hidden="true" style="background:#ffe4e6;">
              <svg viewBox="0 0 24 24" fill="none">
                <path
                  d="M18.6 3H21l-5.3 6.1L22 21h-5l-3.9-5.7L8 21H5.6l5.8-6.7L2 3h5.1l3.6 5.2L15.2 3h3.4Z"
                  fill="#0f172a"
                />
              </svg>
            </div>
            <div>
              <div class="card-title">Twitter</div>
              <div class="card-subtitle">@mounicarajput</div>
            </div>
          </div>
          <div class="card-subtitle">DM me on Twitter.</div>
        </a>
      </section>

      <div class="contact-form">
        <h2 style="text-align: center; margin: 0 0 24px;">Send a Message</h2>
        <form id="contactForm" action="mailto:rajputmonika953@gmail.com" method="post" enctype="text/plain">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </main>
  </body>
</html>
