<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Monika Rajput</title>

  <style>
    :root {
      --bg: #fafafa;
      --card: #ffffff;
      --text: #050816;
      --muted: #6b7280;
      --border: #e5e7eb;
      --link: #2563eb;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: 0.3s;
    }

    /* NAVBAR */
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
    }

    .topbar a {
      text-decoration: none;
      color: var(--muted);
    }

    /* SECTION */
    .container {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      margin-bottom: 30px;
    }

    /* GRID (FIXED YOUR ISSUE) */
    #articlesContainer {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      color: inherit;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .category {
      font-size: 12px;
      color: var(--link);
      font-weight: 600;
    }

    .title {
      font-size: 16px;
      font-weight: 600;
      margin: 10px 0;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
    }

    .meta {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    /* LOADING */
    .loading {
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <div class="topbar">
    <a href="index.html">← Back</a>
  </div>

  <!-- CONTENT -->
  <div class="container">
    <h1>All Articles</h1>

    <div id="articlesContainer">
      <div class="loading">Loading articles...</div>
    </div>
  </div>

  <script>
    // LOAD ARTICLES
    async function loadArticles() {
      try {
        const res = await fetch("articles.json");
        const data = await res.json();

        const container = document.getElementById("articlesContainer");

        container.innerHTML = data.articles.map(a => `
          <a class="card" href="${a.link}" target="_blank">
            <div class="category">${a.category}</div>
            <div class="title">${a.title}</div>
            <div class="desc">${a.description}</div>
            <div class="meta">
              ${a.readTime || "5 min"} • 
              ${new Date(a.date).toLocaleDateString()}
            </div>
          </a>
        `).join("");

      } catch (e) {
        document.getElementById("articlesContainer").innerHTML =
          "<p style='text-align:center'>Failed to load articles</p>";
      }
    }

    loadArticles();
  </script>

</body>
</html>
